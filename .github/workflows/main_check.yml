name: Monte Carlo CI Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-check:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Check PHP Syntax (Lint)
        run: find . -maxdepth 1 -name "*.php" -print0 | xargs -0 -n1 php -l

  frontend-check:
    name: React Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Simulador_de_jubilacion/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: ./Simulador_de_jubilacion

      - name: Build React Project
        run: npm run build
        working-directory: ./Simulador_de_jubilacion
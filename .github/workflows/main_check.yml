name: Monte Carlo CI Check

on:
  push:
    branches: [ main ]

jobs:
  check-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: PHP Lint
        run: php -l *.php

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build React
        run: |
          cd Simulador_de_jubilacion
          npm install
          npm run build